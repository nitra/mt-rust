name: Release mt

on:
  push:
    tags:
      - 'mt-v*'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions: {} # deny-all за замовчуванням; кожен job оголошує потрібне

jobs:
  # ── Збірка бінарника `mt` для GitHub Releases (без npm — спека 2026-07-23-mt-cli-rust.md) ──
  build:
    permissions:
      contents: read # лише checkout; артефакти йдуть через runtime-токен
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-14 # native Apple Silicon
            target: aarch64-apple-darwin
            asset: mt-darwin-arm64
            zig: false
          - os: ubuntu-latest # static musl через cargo-zigbuild
            target: x86_64-unknown-linux-musl
            asset: mt-linux-x64
            zig: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false # build-only, токен не потрібен

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          lookup-only: true # release з тегу: не restore/save shared cache (zizmor cache-poisoning)

      - name: Install cargo-zigbuild (Linux musl)
        if: ${{ matrix.zig }}
        run: |
          pip install ziglang
          cargo install --locked cargo-zigbuild

      - name: Build mt (zigbuild)
        if: ${{ matrix.zig }}
        run: cargo zigbuild --release --target ${{ matrix.target }} -p mt

      - name: Build mt (native)
        if: ${{ !matrix.zig }}
        run: cargo build --release --target ${{ matrix.target }} -p mt

      - name: Stage binary
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/mt" "dist/${{ matrix.asset }}"
          chmod +x "dist/${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  # ── Публікація бінарників як GitHub Release assets ────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # створення релізу + upload assets
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: dist # → dist/<asset>/<asset>

      - name: Flatten artifact layout
        run: |
          mkdir -p release
          cp dist/mt-darwin-arm64/mt-darwin-arm64 release/
          cp dist/mt-linux-x64/mt-linux-x64 release/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release/* --repo "${GITHUB_REPOSITORY}" --generate-notes

  # ── Автооновлення формули mt у tap nitra/homebrew-7n ───────────────────────────
  update-homebrew-tap:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout цього репо не потрібен, лише tap-репо через PAT
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Compute version and checksums
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME#mt-v}" >> "$GITHUB_OUTPUT"
          echo "sha_darwin_arm64=$(shasum -a 256 dist/mt-darwin-arm64/mt-darwin-arm64 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "sha_linux_x64=$(shasum -a 256 dist/mt-linux-x64/mt-linux-x64 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-7n
        uses: actions/checkout@v6
        with:
          repository: nitra/homebrew-7n
          token: ${{ secrets.HOMEBREW_TAP_PAT }}
          path: tap
          persist-credentials: true

      - name: Update formula
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          SHA_DARWIN: ${{ steps.meta.outputs.sha_darwin_arm64 }}
          SHA_LINUX: ${{ steps.meta.outputs.sha_linux_x64 }}
          TAG: ${{ github.ref_name }}
        run: |
          cat > tap/Formula/mt.rb <<EOF
          class Mt < Formula
            desc "mt CLI — задачний граф @7n/mt"
            homepage "https://github.com/nitra/mt-rust"
            version "${VERSION}"
            license "ISC"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/nitra/mt-rust/releases/download/${TAG}/mt-darwin-arm64"
                sha256 "${SHA_DARWIN}"

                def install
                  bin.install "mt-darwin-arm64" => "mt"
                end
              else
                odie "mt: інтел-мак поки не підтримується (немає x86_64-apple-darwin ассету в релізах mt-rust)"
              end
            end

            on_linux do
              url "https://github.com/nitra/mt-rust/releases/download/${TAG}/mt-linux-x64"
              sha256 "${SHA_LINUX}"

              def install
                bin.install "mt-linux-x64" => "mt"
              end
            end

            test do
              system "#{bin}/mt", "--help"
            end
          end
          EOF

      - name: Commit and push
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mt.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date"
            exit 0
          fi
          git commit -m "mt ${{ steps.meta.outputs.version }}"
          git push
